analysis:
  isotope: "238U"
  nmax: 12
  emin: 1.0
  emax: 31.0
  estep: 1.0
  efficiency: 0.73
  low_energy_threshold: 4.0

regularization:
  lambda_min: 1.0e-5
  lambda_max: 1.0
  lambda_points: 1000
  derivative_order: 2
  lambda_choice: "lcurve"

tof:
  distance: 28.33      # m
  distance_error: 0.10 # m
  time_error: 0.8e-9   # s

paths:
  raw_high: "data/raw/multiplicity/Mult_twoanodes_allruns_5dot6.txt"
  raw_low: "data/raw/multiplicity/Mult_twoanodes_run19_20_21_22_24.txt"
  noise_high: "data/raw/noise/Noise_twoanodes_allruns_5dot6.txt"
  noise_low: "data/raw/noise/Noise_twoanodes_run19_20_21_22_24.txt"
  reference_dir: "data/references"
  output_dir: "results"